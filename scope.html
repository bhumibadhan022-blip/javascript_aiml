<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var x=10 //globalscope
        function f1(){
            console.log[x];
        }
        function f2(){
            console.log[x];
        }
        f1();
        f2();

        function f1(){   //localscope
            var x=10
            console.log[x]; //valid
        }
        f1();
        console.log[x] //undefined
    </script>
</body>
</html>
