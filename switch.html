<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<center>
    <h1><tt>welcome to javascript</tt></h1>
</center>
<hr>
<script>
    var grade = window.prompt("enter the grade here:")
    switch(grade)
    {
        case 'A':
            document.write("you passes in first class")
            document.write("<hr>")
            break
            case 'B':
            document.write("you passes in second class")
            break
            case 'C':
            document.write("you passes in average")
            break
            default:
                document.write("enter the proper grade system")
    }
</script>
</body>
</html>
