<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for (var i=1; i<=5; i++){
            if(i==3){
                break;
            }
            console.log(i);
            document.write(i + "<br>");
        }
        for (var j=1; j<=5; j++){
            if(j%2!=1){
                continue;
            }
            console.log(j);
            document.write(j + "<br>");
        }
    </script>
</body>
</html>
