<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flower Bouquet Gift</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f5f7fb;
  font-family: Arial, sans-serif;
}

.gift-container {
  position: relative;
  cursor: pointer;
  text-align: center;
}

/* Box */
.box {
  width: 150px;
  height: 150px;
  background: #ff4d6d;
  border-radius: 10px;
  position: relative;
}

/* Lid */
.lid {
  width: 150px;
  height: 40px;
  background: #c9184a;
  position: absolute;
  top: -40px;
  left: 0;
  border-radius: 10px 10px 0 0;
  transform-origin: bottom;
  transition: transform 0.5s ease;
}

/* Ribbon */
.ribbon-v {
  width: 20px;
  height: 150px;
  background: gold;
  position: absolute;
  left: 65px;
}

.ribbon-h {
  width: 150px;
  height: 20px;
  background: gold;
  position: absolute;
  top: 65px;
}

/* Gift emoji */
.gift {
  position: absolute;
  top: 45px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 40px;
  transition: all 0.5s ease;
}

/* Bouquet */
.bouquet {
  position: absolute;
  left: 50%;
  top: 40px;
  transform: translateX(-50%) scale(0);
  font-size: 55px;
  transition: all 0.6s ease;
}

/* Message */
.message {
  margin-top: 20px;
  font-size: 18px;
  color: #333;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* OPEN STATE */
.open .lid {
  transform: rotate(-120deg);
}

.open .gift {
  opacity: 0;
  transform: translateX(-50%) translateY(-40px);
}

.open .bouquet {
  transform: translateX(-50%) translateY(-120px) scale(1.2);
}

.open .message {
  opacity: 1;
}
</style>

</head>
<body>

<div class="gift-container" onclick="openGift(this)">
  <div class="lid"></div>

  <div class="box">
    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
    <div class="gift">🎁</div>
    <div class="bouquet">💐</div>
  </div>

  <div class="message">🌸 A beautiful bouquet just for you! 🌸</div>
</div>

<script>
function openGift(el) {
  el.classList.add("open");
}
</script>

</body>
</html>
